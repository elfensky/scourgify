# calibre-wrangler configuration.
# `wrangle.py setup` generates this for you (detecting your columns); edit anytime.

[columns]
# Map each FanFicFare field to a Calibre column LABEL. "" disables that field's passes.
# (`tags` is the built-in tags column; the rest are custom columns named like "#fandoms".)
fandoms       = "#fandoms"
characters    = "#characters"
relationships = "#relationships"
genres        = "#genres"
status        = "#status"
tags          = "tags"

[behavior]
# Opinionated, sane defaults. Flip to taste.
fold_characters  = true     # apply abbreviation -> full-name defaults (Harry P. -> Harry Potter)
ascii_only_tags  = true     # transliterate non-ASCII tags to plain ASCII (smart quotes/accents)
au_as            = "genre"  # where "Alternate Universe" lands: "genre" or "tag"
crossover_as     = "genre"  # "genre" or "tag"
reincarnation_as = "genre"
time_travel_as   = "genre"
fold_ratings     = false    # Erotica->Smut, Adult->Mature (off: keep them distinct)
keep_categories  = true     # keep relationship-category tags (Multi/Gen/F-M); false = drop them

[overrides]
# Optional folder of user files that EXTEND and WIN OVER the bundled defaults/.
# Same filenames/formats as defaults/ (characters.csv, fandoms.csv, tropes.csv, junk.txt, ...).
dir = "overrides"
